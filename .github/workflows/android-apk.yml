name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    env:
      CAPACITOR_SERVER_URL: ${{ secrets.CAPACITOR_SERVER_URL }}
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm install

      - name: Validate Next.js build
        run: npm run build

      - name: Prepare minimal webDir for Capacitor
        run: |
          mkdir -p www
          cat <<'EOF' > www/index.html
          <!doctype html>
          <html>
            <head><meta charset="utf-8"><title>File Convert App</title></head>
            <body>Loading...</body>
          </html>
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor config
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-convert-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
